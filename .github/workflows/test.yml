name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/ontology_engine/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ontology_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Set up PostgreSQL extensions
        run: |
          PGPASSWORD=test psql -h localhost -U test -d ontology_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=test psql -h localhost -U test -d ontology_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=test psql -h localhost -U test -d ontology_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"

      - name: Run integration tests
        env:
          ONTOLOGY_TEST_DB_URL: postgresql://test:test@localhost:5432/ontology_test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: pytest tests/integration/ -v --tb=short
        if: env.GEMINI_API_KEY != ''
