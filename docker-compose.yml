services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ontology
      POSTGRES_PASSWORD: ontology
      POSTGRES_DB: ontology
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ontology"]
      interval: 5s
      timeout: 5s
      retries: 5

  ontology-engine:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ontology:ontology@db:5432/ontology
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data  # Mount data directory for file ingestion

volumes:
  pgdata:
